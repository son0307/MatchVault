name: Codex PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review and summarize PR
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_REVIEW_MODEL: ${{ vars.CODEX_REVIEW_MODEL || 'gpt-5.6-luna' }}

    steps:
      - name: Checkout base branch prompts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Generate Codex review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs/promises');

            const marker = '<!-- codex-pr-review -->';
            const maxDiffChars = 90000;
            const model = process.env.CODEX_REVIEW_MODEL || 'gpt-5.6-luna';
            const apiKey = process.env.OPENAI_API_KEY;

            if (!apiKey) {
              core.setFailed('OPENAI_API_KEY secret is required for Codex PR Review.');
              return;
            }

            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            const readPrompt = async (name) => {
              return fs.readFile(`.github/codex-prompts/${name}.md`, 'utf8');
            };

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const fileSummary = files.map((file) => {
              const header = [
                `File: ${file.filename}`,
                `Status: ${file.status}`,
                `Changes: +${file.additions} -${file.deletions}`,
              ].join('\n');

              if (!file.patch) {
                return `${header}\nPatch: unavailable, possibly binary or too large.`;
              }

              return `${header}\nPatch:\n${file.patch}`;
            }).join('\n\n---\n\n');

            let diffText = fileSummary;
            let truncated = false;
            if (diffText.length > maxDiffChars) {
              diffText = diffText.slice(0, maxDiffChars);
              truncated = true;
            }

            const input = [
              `Repository: ${owner}/${repo}`,
              `PR #${pr.number}: ${pr.title}`,
              `Author: ${pr.user?.login || 'unknown'}`,
              `Base: ${pr.base?.ref || 'unknown'} (${pr.base?.sha || 'unknown'})`,
              `Head: ${pr.head?.ref || 'unknown'} (${pr.head?.sha || 'unknown'})`,
              `PR body:\n${pr.body || '(no body)'}`,
              truncated ? `Diff note: diff was truncated to ${maxDiffChars} characters.` : 'Diff note: complete GitHub file patches were provided.',
              `Diff:\n${diffText}`,
            ].join('\n\n');

            const extractText = (data) => {
              if (typeof data.output_text === 'string' && data.output_text.trim()) {
                return data.output_text.trim();
              }

              const chunks = [];
              for (const item of data.output || []) {
                for (const content of item.content || []) {
                  if (typeof content.text === 'string') {
                    chunks.push(content.text);
                  }
                }
              }

              return chunks.join('\n').trim();
            };

            const callOpenAI = async (promptName, instructions, maxOutputTokens) => {
              const response = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${apiKey}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model,
                  instructions,
                  input,
                  max_output_tokens: maxOutputTokens,
                  store: false,
                }),
              });

              const text = await response.text();
              let data;
              try {
                data = JSON.parse(text);
              } catch {
                throw new Error(`${promptName} response was not JSON. HTTP ${response.status}`);
              }

              if (!response.ok) {
                const message = data.error?.message || `HTTP ${response.status}`;
                throw new Error(`${promptName} failed: ${message}`);
              }

              const output = extractText(data);
              if (!output) {
                throw new Error(`${promptName} returned an empty response.`);
              }

              return output;
            };

            const [reviewPrompt, securityPrompt, summaryPrompt] = await Promise.all([
              readPrompt('review'),
              readPrompt('security-review'),
              readPrompt('summarize'),
            ]);

            const [review, securityReview, summary] = await Promise.all([
              callOpenAI('review', reviewPrompt, 2600),
              callOpenAI('security-review', securityPrompt, 2200),
              callOpenAI('summarize', summaryPrompt, 1600),
            ]);

            const body = [
              marker,
              '# Codex PR Review',
              '',
              summary,
              '',
              review,
              '',
              securityReview,
              '',
              `Model: \`${model}\``,
              truncated ? `Diff was truncated to ${maxDiffChars} characters; review may be incomplete.` : '',
            ].filter(Boolean).join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => {
              return comment.user?.type === 'Bot' && comment.body?.includes(marker);
            });

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }

            await core.summary
              .addRaw(body.replace(marker, '').trim())
              .write();
