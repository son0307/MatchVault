spring:
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: update
  # DB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

live:
  api-football:
    base-url: ${LIVE_API_FOOTBALL_BASE_URL:https://v3.football.api-sports.io}
    api-key: ${API_FOOTBALL_KEY:}
    api-host: ${API_FOOTBALL_HOST:}
  sync:
    enabled: ${LIVE_SYNC_ENABLED:false}
    interval-ms: ${LIVE_SYNC_INTERVAL_MS:5000}
    fixture-ids: ${LIVE_SYNC_FIXTURE_IDS:1208000}

api-football:
  sync:
    teams:
      enabled: ${API_FOOTBALL_TEAMS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_TEAMS_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_TEAMS_LEAGUE:39}
      season: ${API_FOOTBALL_TEAMS_SEASON:2024}
      cron: ${API_FOOTBALL_TEAMS_SYNC_CRON:0 0 4 * * *}
    standings:
      enabled: ${API_FOOTBALL_STANDINGS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_STANDINGS_SYNC_RUN_ON_STARTUP:false}
      local-finished-update-enabled: ${API_FOOTBALL_STANDINGS_LOCAL_FINISHED_UPDATE_ENABLED:false}
      local-live-update-enabled: ${API_FOOTBALL_STANDINGS_LOCAL_LIVE_UPDATE_ENABLED:false}
      local-live-impact-ttl-hours: ${API_FOOTBALL_STANDINGS_LOCAL_LIVE_IMPACT_TTL_HOURS:6}
      league: ${API_FOOTBALL_STANDINGS_LEAGUE:39}
      season: ${API_FOOTBALL_STANDINGS_SEASON:2024}
      daily-cron: ${API_FOOTBALL_STANDINGS_DAILY_CRON:0 10 4 * * *}
      live-cron: ${API_FOOTBALL_STANDINGS_LIVE_CRON:0 0 * * * *}
    fixtures:
      enabled: ${API_FOOTBALL_FIXTURES_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_FIXTURES_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_FIXTURES_LEAGUE:39}
      season: ${API_FOOTBALL_FIXTURES_SEASON:2024}
      daily-cron: ${API_FOOTBALL_FIXTURES_DAILY_CRON:0 20 4 * * *}
      live-cron: ${API_FOOTBALL_FIXTURES_LIVE_CRON:0 * * * * *}
      live-window-before-minutes: ${API_FOOTBALL_FIXTURES_LIVE_WINDOW_BEFORE_MINUTES:10}
      live-window-after-hours: ${API_FOOTBALL_FIXTURES_LIVE_WINDOW_AFTER_HOURS:4}
    fixture-events:
      enabled: ${API_FOOTBALL_FIXTURE_EVENTS_SYNC_ENABLED:false}
      live-cron: ${API_FOOTBALL_FIXTURE_EVENTS_LIVE_CRON:0 * * * * *}
      daily-cron: ${API_FOOTBALL_FIXTURE_EVENTS_DAILY_CRON:0 30 4 * * *}
      test-runner-enabled: ${API_FOOTBALL_FIXTURE_EVENTS_TEST_RUNNER_ENABLED:false}
      startup-delay-ms: ${API_FOOTBALL_FIXTURE_EVENTS_STARTUP_DELAY_MS:300}
    fixture-lineups:
      enabled: ${API_FOOTBALL_FIXTURE_LINEUPS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_FIXTURE_LINEUPS_SYNC_RUN_ON_STARTUP:false}
      live-cron: ${API_FOOTBALL_FIXTURE_LINEUPS_LIVE_CRON:0 */15 * * * *}
      daily-cron: ${API_FOOTBALL_FIXTURE_LINEUPS_DAILY_CRON:0 40 4 * * *}
      window-before-minutes: ${API_FOOTBALL_FIXTURE_LINEUPS_WINDOW_BEFORE_MINUTES:45}
      window-after-hours: ${API_FOOTBALL_FIXTURE_LINEUPS_WINDOW_AFTER_HOURS:4}
      startup-delay-ms: ${API_FOOTBALL_FIXTURE_LINEUPS_STARTUP_DELAY_MS:300}
    fixture-player-stats:
      enabled: ${API_FOOTBALL_FIXTURE_PLAYER_STATS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_FIXTURE_PLAYER_STATS_SYNC_RUN_ON_STARTUP:false}
      live-cron: ${API_FOOTBALL_FIXTURE_PLAYER_STATS_LIVE_CRON:0 * * * * *}
      daily-cron: ${API_FOOTBALL_FIXTURE_PLAYER_STATS_DAILY_CRON:0 45 4 * * *}
      startup-delay-ms: ${API_FOOTBALL_FIXTURE_PLAYER_STATS_STARTUP_DELAY_MS:300}
    fixture-statistics:
      enabled: ${API_FOOTBALL_FIXTURE_STATISTICS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_FIXTURE_STATISTICS_SYNC_RUN_ON_STARTUP:false}
      live-cron: ${API_FOOTBALL_FIXTURE_STATISTICS_LIVE_CRON:0 * * * * *}
      daily-cron: ${API_FOOTBALL_FIXTURE_STATISTICS_DAILY_CRON:0 50 4 * * *}
      startup-delay-ms: ${API_FOOTBALL_FIXTURE_STATISTICS_STARTUP_DELAY_MS:300}
    players:
      profile-fallback-enabled: ${API_FOOTBALL_PLAYERS_PROFILE_FALLBACK_ENABLED:false}
      squads:
        enabled: ${API_FOOTBALL_PLAYERS_SQUADS_SYNC_ENABLED:false}
        cron: ${API_FOOTBALL_PLAYERS_SQUADS_SYNC_CRON:0 50 4 * * SUN}
        delay-ms: ${API_FOOTBALL_PLAYERS_SQUADS_SYNC_DELAY_MS:7000}
        test-runner-enabled: ${API_FOOTBALL_PLAYERS_SQUADS_TEST_RUNNER_ENABLED:false}
        test-runner-delay-ms: ${API_FOOTBALL_PLAYERS_SQUADS_TEST_RUNNER_DELAY_MS:7000}
    injuries:
      enabled: ${API_FOOTBALL_INJURIES_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_INJURIES_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_INJURIES_LEAGUE:39}
      season: ${API_FOOTBALL_INJURIES_SEASON:2024}
      daily-cron: ${API_FOOTBALL_INJURIES_DAILY_CRON:0 0 5 * * *}
