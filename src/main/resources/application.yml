spring:
  profiles:
    default: local
  jpa:
    hibernate:
      ddl-auto: update
  # DB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

app:
  cache:
    team-player-rankings-ttl: ${TEAM_PLAYER_RANKINGS_CACHE_TTL:10m}
    favorite-card-ttl: ${FAVORITE_CARD_CACHE_TTL:30s}

news:
  serp-api:
    base-url: ${SERPAPI_BASE_URL:https://serpapi.com}
    api-key: ${SERPAPI_API_KEY:}
    lookback-days: ${NEWS_LOOKBACK_DAYS:7}
    max-articles-per-team: ${NEWS_MAX_ARTICLES_PER_TEAM:20}
    connect-timeout: ${SERPAPI_CONNECT_TIMEOUT:3s}
    request-timeout: ${SERPAPI_REQUEST_TIMEOUT:15s}
    search-sites:
      - bbc.com/sport/football
      - skysports.com/football
      - theguardian.com/football
      - nytimes.com/athletic
      - goal.com
      - telegraph.co.uk/football
  translation:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_NEWS_TRANSLATION_MODEL:gpt-5.6-luna}
    batch-size: ${NEWS_TRANSLATION_BATCH_SIZE:50}
    connect-timeout: ${OPENAI_CONNECT_TIMEOUT:3s}
    request-timeout: ${OPENAI_REQUEST_TIMEOUT:60s}
  sync:
    enabled: ${NEWS_SYNC_ENABLED:false}
    cron: ${NEWS_SYNC_CRON:0 0 6 * * *}
    zone: ${NEWS_SYNC_ZONE:Asia/Seoul}
    retention-days: ${NEWS_RETENTION_DAYS:90}

live:
  api-football:
    base-url: ${LIVE_API_FOOTBALL_BASE_URL:https://v3.football.api-sports.io}
    api-key: ${API_FOOTBALL_KEY:}
    api-host: ${API_FOOTBALL_HOST:}
    connect-timeout: ${LIVE_API_FOOTBALL_CONNECT_TIMEOUT:3s}
    request-timeout: ${LIVE_API_FOOTBALL_REQUEST_TIMEOUT:15s}
    circuit-breaker:
      enabled: ${LIVE_API_FOOTBALL_CIRCUIT_BREAKER_ENABLED:true}
      failure-threshold: ${LIVE_API_FOOTBALL_CIRCUIT_BREAKER_FAILURE_THRESHOLD:5}
      cooldown-ms: ${LIVE_API_FOOTBALL_CIRCUIT_BREAKER_COOLDOWN_MS:60000}
  sync:
    enabled: ${LIVE_SYNC_ENABLED:false}
    interval-ms: ${LIVE_SYNC_INTERVAL_MS:5000}
    failure-threshold: ${LIVE_SYNC_FAILURE_THRESHOLD:3}
    failure-cooldown-ms: ${LIVE_SYNC_FAILURE_COOLDOWN_MS:60000}

external-api:
  retry:
    max-attempts: ${EXTERNAL_API_RETRY_MAX_ATTEMPTS:3}
    initial-delay: ${EXTERNAL_API_RETRY_INITIAL_DELAY:500ms}
    max-delay: ${EXTERNAL_API_RETRY_MAX_DELAY:5s}
    max-retry-after: ${EXTERNAL_API_RETRY_MAX_RETRY_AFTER:30s}
    jitter-max: ${EXTERNAL_API_RETRY_JITTER_MAX:250ms}

media:
  public-base-url: ${MEDIA_PUBLIC_BASE_URL:}
  r2:
    enabled: ${MEDIA_R2_ENABLED:false}
    endpoint: ${MEDIA_R2_ENDPOINT:}
    bucket: ${MEDIA_R2_BUCKET:}
    region: ${MEDIA_R2_REGION:auto}
    access-key: ${MEDIA_R2_ACCESS_KEY:}
    secret-key: ${MEDIA_R2_SECRET_KEY:}
  cache:
    enabled: ${MEDIA_CACHE_ENABLED:false}
    allowed-hosts: ${MEDIA_CACHE_ALLOWED_HOSTS:media.api-sports.io}
    max-bytes: ${MEDIA_CACHE_MAX_BYTES:2097152}
    connect-timeout: ${MEDIA_CACHE_CONNECT_TIMEOUT:3s}
    request-timeout: ${MEDIA_CACHE_REQUEST_TIMEOUT:5s}
    failure-cooldown: ${MEDIA_CACHE_FAILURE_COOLDOWN:6h}
    scheduler:
      enabled: ${MEDIA_CACHE_SCHEDULER_ENABLED:false}
      cron: ${MEDIA_CACHE_SCHEDULER_CRON:0 30 * * * *}
      batch-size: ${MEDIA_CACHE_SCHEDULER_BATCH_SIZE:50}
  admin-media-cleanup:
    enabled: ${MEDIA_ADMIN_MEDIA_CLEANUP_ENABLED:true}
    cron: ${MEDIA_ADMIN_MEDIA_CLEANUP_CRON:0 0 3 * * SUN}
    zone: ${MEDIA_ADMIN_MEDIA_CLEANUP_ZONE:Asia/Seoul}
    minimum-age: ${MEDIA_ADMIN_MEDIA_CLEANUP_MINIMUM_AGE:1h}

api-football:
  sync:
    failure-retry:
      enabled: ${API_FOOTBALL_SYNC_FAILURE_RETRY_ENABLED:true}
      max-attempts: ${API_FOOTBALL_SYNC_FAILURE_RETRY_MAX_ATTEMPTS:2}
      delay-minutes: ${API_FOOTBALL_SYNC_FAILURE_RETRY_DELAY_MINUTES:1}
    league-seasons:
      enabled: ${API_FOOTBALL_LEAGUE_SEASONS_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_LEAGUE_SEASONS_SYNC_RUN_ON_STARTUP:true}
      league: ${API_FOOTBALL_LEAGUE_SEASONS_LEAGUE:39}
      daily-cron: ${API_FOOTBALL_LEAGUE_SEASONS_DAILY_CRON:0 0 3 * * *}
    teams:
      enabled: ${API_FOOTBALL_TEAMS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_TEAMS_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_TEAMS_LEAGUE:39}
      season: ${API_FOOTBALL_TEAMS_SEASON:2025}
      cron: ${API_FOOTBALL_TEAMS_SYNC_CRON:0 0 4 * * *}
    standings:
      enabled: ${API_FOOTBALL_STANDINGS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_STANDINGS_SYNC_RUN_ON_STARTUP:false}
      local-finished-update-enabled: ${API_FOOTBALL_STANDINGS_LOCAL_FINISHED_UPDATE_ENABLED:false}
      local-live-update-enabled: ${API_FOOTBALL_STANDINGS_LOCAL_LIVE_UPDATE_ENABLED:false}
      local-live-impact-ttl-hours: ${API_FOOTBALL_STANDINGS_LOCAL_LIVE_IMPACT_TTL_HOURS:6}
      league: ${API_FOOTBALL_STANDINGS_LEAGUE:39}
      season: ${API_FOOTBALL_STANDINGS_SEASON:2025}
      daily-cron: ${API_FOOTBALL_STANDINGS_DAILY_CRON:0 10 4 * * *}
      live-cron: ${API_FOOTBALL_STANDINGS_LIVE_CRON:0 0 * * * *}
    fixtures:
      enabled: ${API_FOOTBALL_FIXTURES_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_FIXTURES_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_FIXTURES_LEAGUE:39}
      season: ${API_FOOTBALL_FIXTURES_SEASON:2025}
      daily-cron: ${API_FOOTBALL_FIXTURES_DAILY_CRON:0 20 4 * * *}
      live-cron: ${API_FOOTBALL_FIXTURES_LIVE_CRON:0 * * * * *}
      live-window-before-minutes: ${API_FOOTBALL_FIXTURES_LIVE_WINDOW_BEFORE_MINUTES:10}
      live-window-after-hours: ${API_FOOTBALL_FIXTURES_LIVE_WINDOW_AFTER_HOURS:4}
    fixture-details:
      enabled: ${API_FOOTBALL_FIXTURE_DETAILS_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_FIXTURE_DETAILS_SYNC_RUN_ON_STARTUP:false}
      live-cron: ${API_FOOTBALL_FIXTURE_DETAILS_LIVE_CRON:0 * * * * *}
      daily-cron: ${API_FOOTBALL_FIXTURE_DETAILS_DAILY_CRON:0 55 4 * * *}
      chunk-size: ${API_FOOTBALL_FIXTURE_DETAILS_CHUNK_SIZE:10}
    players:
      profile-fallback-enabled: ${API_FOOTBALL_PLAYERS_PROFILE_FALLBACK_ENABLED:false}
      registered:
        enabled: ${API_FOOTBALL_PLAYERS_REGISTERED_SYNC_ENABLED:false}
        run-on-startup: ${API_FOOTBALL_PLAYERS_REGISTERED_SYNC_RUN_ON_STARTUP:false}
        league: ${API_FOOTBALL_PLAYERS_REGISTERED_LEAGUE:39}
        season: ${API_FOOTBALL_PLAYERS_REGISTERED_SEASON:2025}
        daily-cron: ${API_FOOTBALL_PLAYERS_REGISTERED_DAILY_CRON:0 10 5 * * *}
        delay-ms: ${API_FOOTBALL_PLAYERS_REGISTERED_SYNC_DELAY_MS:7000}
        startup-delay-ms: ${API_FOOTBALL_PLAYERS_REGISTERED_STARTUP_DELAY_MS:7000}
    injuries:
      enabled: ${API_FOOTBALL_INJURIES_SYNC_ENABLED:false}
      run-on-startup: ${API_FOOTBALL_INJURIES_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_INJURIES_LEAGUE:39}
      season: ${API_FOOTBALL_INJURIES_SEASON:2025}
      daily-cron: ${API_FOOTBALL_INJURIES_DAILY_CRON:0 0 5 * * *}
