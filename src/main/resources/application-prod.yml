live:
  api-football:
    base-url: ${LIVE_API_FOOTBALL_BASE_URL:https://v3.football.api-sports.io}
    api-key: ${API_FOOTBALL_KEY}
    api-host: ${API_FOOTBALL_HOST:}
  sync:
    enabled: ${LIVE_SYNC_ENABLED:false  }
    failure-threshold: ${LIVE_SYNC_FAILURE_THRESHOLD:3}
    failure-cooldown-ms: ${LIVE_SYNC_FAILURE_COOLDOWN_MS:60000}

api-football:
  sync:
    league-seasons:
      enabled: ${API_FOOTBALL_LEAGUE_SEASONS_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_LEAGUE_SEASONS_SYNC_RUN_ON_STARTUP:true}
      league: ${API_FOOTBALL_LEAGUE_SEASONS_LEAGUE:39}
      daily-cron: ${API_FOOTBALL_LEAGUE_SEASONS_DAILY_CRON:0 0 3 * * *}
    teams:
      enabled: ${API_FOOTBALL_TEAMS_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_TEAMS_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_TEAMS_LEAGUE:39}
      season: ${API_FOOTBALL_TEAMS_SEASON:2010}
      cron: ${API_FOOTBALL_TEAMS_SYNC_CRON:0 0 4 * * *}
    standings:
      enabled: ${API_FOOTBALL_STANDINGS_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_STANDINGS_SYNC_RUN_ON_STARTUP:false}
      local-finished-update-enabled: ${API_FOOTBALL_STANDINGS_LOCAL_FINISHED_UPDATE_ENABLED:true}
      local-live-update-enabled: ${API_FOOTBALL_STANDINGS_LOCAL_LIVE_UPDATE_ENABLED:true}
      local-live-impact-ttl-hours: ${API_FOOTBALL_STANDINGS_LOCAL_LIVE_IMPACT_TTL_HOURS:6}
      league: ${API_FOOTBALL_STANDINGS_LEAGUE:39}
      season: ${API_FOOTBALL_STANDINGS_SEASON:2010}
      daily-cron: ${API_FOOTBALL_STANDINGS_DAILY_CRON:0 10 4 * * *}
      live-cron: ${API_FOOTBALL_STANDINGS_LIVE_CRON:0 0 * * * *}
    fixtures:
      enabled: ${API_FOOTBALL_FIXTURES_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_FIXTURES_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_FIXTURES_LEAGUE:39}
      season: ${API_FOOTBALL_FIXTURES_SEASON:2010}
      daily-cron: ${API_FOOTBALL_FIXTURES_DAILY_CRON:0 20 4 * * *}
      live-cron: ${API_FOOTBALL_FIXTURES_LIVE_CRON:0 * * * * *}
      live-window-before-minutes: ${API_FOOTBALL_FIXTURES_LIVE_WINDOW_BEFORE_MINUTES:10}
      live-window-after-hours: ${API_FOOTBALL_FIXTURES_LIVE_WINDOW_AFTER_HOURS:4}
    fixture-details:
      enabled: ${API_FOOTBALL_FIXTURE_DETAILS_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_FIXTURE_DETAILS_SYNC_RUN_ON_STARTUP:false}
      live-cron: ${API_FOOTBALL_FIXTURE_DETAILS_LIVE_CRON:0 * * * * *}
      daily-cron: ${API_FOOTBALL_FIXTURE_DETAILS_DAILY_CRON:0 55 4 * * *}
      chunk-size: ${API_FOOTBALL_FIXTURE_DETAILS_CHUNK_SIZE:10}
    players:
      profile-fallback-enabled: ${API_FOOTBALL_PLAYERS_PROFILE_FALLBACK_ENABLED:true}
      registered:
        enabled: ${API_FOOTBALL_PLAYERS_REGISTERED_SYNC_ENABLED:true}
        run-on-startup: ${API_FOOTBALL_PLAYERS_REGISTERED_SYNC_RUN_ON_STARTUP:false}
        league: ${API_FOOTBALL_PLAYERS_REGISTERED_LEAGUE:39}
        season: ${API_FOOTBALL_PLAYERS_REGISTERED_SEASON:2010}
        daily-cron: ${API_FOOTBALL_PLAYERS_REGISTERED_DAILY_CRON:0 10 5 * * *}
        delay-ms: ${API_FOOTBALL_PLAYERS_REGISTERED_SYNC_DELAY_MS:2000}
        startup-delay-ms: ${API_FOOTBALL_PLAYERS_REGISTERED_STARTUP_DELAY_MS:2000}
    injuries:
      enabled: ${API_FOOTBALL_INJURIES_SYNC_ENABLED:true}
      run-on-startup: ${API_FOOTBALL_INJURIES_SYNC_RUN_ON_STARTUP:false}
      league: ${API_FOOTBALL_INJURIES_LEAGUE:39}
      season: ${API_FOOTBALL_INJURIES_SEASON:2010}
      daily-cron: ${API_FOOTBALL_INJURIES_DAILY_CRON:0 0 5 * * *}
